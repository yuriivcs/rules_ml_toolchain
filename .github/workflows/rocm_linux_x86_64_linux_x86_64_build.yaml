name: ROCm Linux x86_64 -> Linux x86_64 build

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read
  pull-requests: read
  issues: read

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  # Don't cancel in-progress jobs for main branch
  cancel-in-progress: ${{ github.ref != 'main' }}

jobs:
  run-tests:
    name: "ROCm Linux x86_64 -> Linux x86_64 build. Runner ${{ matrix.job_info.runner }}"
    defaults:
      run:
        # Explicitly set the shell to bash
        shell: bash
    strategy:
      matrix:
        job_info: [
          {
            runner: "linux-x86-n2-16",
            container: "us-docker.pkg.dev/ml-oss-artifacts-published/ml-public-container/ml-build:latest",
          },
        ]
    # Use self-hosted runners with ROCm support
    runs-on: ${{ matrix.job_info.runner }}
    container:
      image: ${{ matrix.job_info.container }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Test ROCm GPU code compilation (hermetic HIPcc)
        run: |
          bazel test --color=yes \
            --config=rocm \
            --repo_env=TF_ROCM_AMDGPU_TARGETS="gfx942" \
            --repo_env=ROCM_DISTRO_VERSION="rocm_7.12.0_gfx94X" \
            --define=using_rocm=true \
            //cc/tests/gpu/rocm:all

      - name: Test host (CPU) code compilation with ROCm toolchain
        run: |
          bazel test --color=yes \
            --config=rocm \
            --repo_env=TF_ROCM_AMDGPU_TARGETS="gfx942" \
            --repo_env=ROCM_DISTRO_VERSION="rocm_7.12.0_gfx94X" \
            --define=using_rocm=true \
            //cc/tests/cpu:all

      - name: Test ROCm GPU code compilation (bzlmod)
        run: |
          bazel test --color=yes \
            --config=rocm \
            --repo_env=TF_ROCM_AMDGPU_TARGETS="gfx942" \
            --repo_env=ROCM_DISTRO_VERSION="rocm_7.12.0_gfx94X" \
            --config=bzlmod \
            --define=using_rocm=true \
            //cc/tests/gpu/rocm:all

      - name: Test host (CPU) code compilation (bzlmod)
        run: |
          bazel test --color=yes \
            --config=rocm \
            --repo_env=TF_ROCM_AMDGPU_TARGETS="gfx942" \
            --repo_env=ROCM_DISTRO_VERSION="rocm_7.12.0_gfx94X" \
            --config=bzlmod \
            --define=using_rocm=true \
            //cc/tests/cpu:all

      - name: Test ROCm GPU code compilation (local sysroot)
        run: |
          bazel test --color=yes \
            --@rules_ml_toolchain//cc/sysroots:use_local_sysroot=True \
            --config=rocm \
            --repo_env=TF_ROCM_AMDGPU_TARGETS="gfx942" \
            --repo_env=ROCM_DISTRO_VERSION="rocm_7.12.0_gfx94X" \
            --define=using_rocm=true \
            //cc/tests/gpu/rocm:all

      - name: Test host (CPU) code compilation (local sysroot)
        run: |
          bazel test --color=yes \
            --@rules_ml_toolchain//cc/sysroots:use_local_sysroot=True \
            --config=rocm \
            --repo_env=TF_ROCM_AMDGPU_TARGETS="gfx942" \
            --repo_env=ROCM_DISTRO_VERSION="rocm_7.12.0_gfx94X" \
            --define=using_rocm=true \
            //cc/tests/cpu:all

      - name: Test ROCm GPU code compilation (local sysroot + bzlmod)
        run: |
          bazel test --color=yes \
            --@rules_ml_toolchain//cc/sysroots:use_local_sysroot=True \
            --config=rocm \
            --repo_env=TF_ROCM_AMDGPU_TARGETS="gfx942" \
            --repo_env=ROCM_DISTRO_VERSION="rocm_7.12.0_gfx94X" \
            --config=bzlmod \
            --define=using_rocm=true \
            //cc/tests/gpu/rocm:all

      - name: Test host (CPU) code compilation (local sysroot + bzlmod)
        run: |
          bazel test --color=yes \
            --@rules_ml_toolchain//cc/sysroots:use_local_sysroot=True \
            --config=rocm \
            --repo_env=TF_ROCM_AMDGPU_TARGETS="gfx942" \
            --repo_env=ROCM_DISTRO_VERSION="rocm_7.12.0_gfx94X" \
            --config=bzlmod \
            --define=using_rocm=true \
            //cc/tests/cpu:all
