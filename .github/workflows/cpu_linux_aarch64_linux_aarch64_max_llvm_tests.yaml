name: CI - CPU Linux aarch64 -> Linux aarch64 tests. Max LLVM/sysroot

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read
  pull-requests: read
  issues: read

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  # Don't cancel in-progress jobs for main branch
  cancel-in-progress: ${{ github.ref != 'main' }}

jobs:
  run-tests:
    name: "CPU Linux aarch64 -> Linux aarch64 tests. Max LLVM/sysroot. Runner ${{ matrix.job_info.runner }}"
    defaults:
      run:
        # Explicitly set the shell to bash
        shell: bash
    strategy:
      matrix:
        job_info: [
          {
            runner: "linux-arm64-c4a-16",
            container: "us-docker.pkg.dev/ml-oss-artifacts-published/ml-public-container/ml-build-arm64:latest",
          },
        ]
    # Use self-hosted runners. For a Linux runner, a corresponding container image used for the
    # workflow is required.
    # See go/ml-github-actions/getting_started/using_runners.md#supported-runner-scale-set.
    runs-on: ${{ matrix.job_info.runner }}
    container:
      image: ${{ matrix.job_info.container }}
    steps:
      - name: "Checkout repository"
        uses: actions/checkout@v5

      - name: "Clang 21, Glibc 2.31 | Testing..."
        run: |
          bazel test --color=yes \
            --repo_env=LLVM_VERSION=21 \
            --repo_env=SYSROOT_DIST=linux_glibc_2_31 \
            //cc/tests/cpu:all

      - name: "Clang 22, Glibc 2.31, libc++ static linking | Testing..."
        run: |
          bazel test --color=yes \
            --repo_env=LLVM_VERSION=22 \
            --repo_env=SYSROOT_DIST=linux_glibc_2_31 \
            --@rules_ml_toolchain//common:stdlib=libc++ \
            --@rules_ml_toolchain//common:static_libcxx=true \
            //cc/tests/cpu:all

      - name: "Bzlmod. Clang 22, Glibc 2.31 | Testing..."
        run: |
          bazel test --color=yes --config=bzlmod \
            --repo_env=LLVM_VERSION=22 \
            --repo_env=SYSROOT_DIST=linux_glibc_2_31 \
            //cc/tests/cpu:all

      - name: "Bzlmod. Clang 21, Glibc 2.31, libc++ static linking | Testing..."
        run: |
          bazel test --color=yes --config=bzlmod \
            --repo_env=LLVM_VERSION=21 \
            --repo_env=SYSROOT_DIST=linux_glibc_2_31 \
            --@rules_ml_toolchain//common:stdlib=libc++ \
            --@rules_ml_toolchain//common:static_libcxx=true \
            //cc/tests/cpu:all
