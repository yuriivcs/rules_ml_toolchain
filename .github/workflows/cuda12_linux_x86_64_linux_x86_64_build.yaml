name: CUDA 12 Linux x86_64 -> Linux x86_64 build

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read
  pull-requests: read
  issues: read

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  # Don't cancel in-progress jobs for main branch
  cancel-in-progress: ${{ github.ref != 'main' }}

jobs:
  run-tests:
    name: "CUDA 12 Linux x86_64 -> Linux x86_64 build. Runner ${{ matrix.job_info.runner }}"
    defaults:
      run:
        # Explicitly set the shell to bash
        shell: bash
    strategy:
      matrix:
        job_info: [
          {
            runner: "linux-x86-n2-16",
            container: "us-docker.pkg.dev/ml-oss-artifacts-published/ml-public-container/ml-build:latest",
          },
        ]
    # Use self-hosted runners. For a Linux runner, a corresponding container image used for the
    # workflow is required.
    # See go/ml-github-actions/getting_started/using_runners.md#supported-runner-scale-set.
    runs-on: ${{ matrix.job_info.runner }}
    container:
      image: ${{ matrix.job_info.container }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: "Clang 18, Glibc 2.27 | Testing..."
        run: |
          bazel build --color=yes --config=build_cuda_with_clang \
            --config=cuda12 \
            --config=cuda_libraries_from_stubs \
            --repo_env=HERMETIC_CUDA_COMPUTE_CAPABILITIES="sm_50,sm_60,sm_70,sm_80,sm_90" \
            //cc/tests/gpu:all

      - name: "Clang 18, Glibc 2.27, libc++ static linking | Testing..."
        run: |
          bazel build --color=yes --config=build_cuda_with_clang \
            --config=cuda12 \
            --config=cuda_libraries_from_stubs \
            --repo_env=HERMETIC_CUDA_COMPUTE_CAPABILITIES="sm_50,sm_60,sm_70,sm_80,sm_90" \
            --@rules_ml_toolchain//common:stdlib=libc++ \
            --@rules_ml_toolchain//common:static_libcxx=true \
            //cc/tests/gpu:all

      - name: "Clang 21, Glibc 2.31 | Testing..."
        run: |
          bazel build --color=yes --config=build_cuda_with_clang \
            --config=cuda12 \
            --config=cuda_libraries_from_stubs \
            --repo_env=LLVM_VERSION=21 \
            --repo_env=SYSROOT_DIST=linux_glibc_2_31 \
            //cc/tests/gpu:all

      - name: "Clang 22, Glibc 2.35 | Testing..."
        run: |
          bazel build --color=yes --config=build_cuda_with_clang \
            --config=cuda12 \
            --config=cuda_libraries_from_stubs \
            --repo_env=LLVM_VERSION=22 \
            --repo_env=SYSROOT_DIST=linux_glibc_2_35 \
            //cc/tests/gpu:all

      - name: "Clang 22, Glibc 2.39 | Testing..."
        run: |
          bazel build --color=yes --config=build_cuda_with_clang \
            --config=cuda12 \
            --config=cuda_libraries_from_stubs \
            --repo_env=LLVM_VERSION=22 \
            --repo_env=SYSROOT_DIST=linux_glibc_2_39 \
            //cc/tests/gpu:all

      - name: "Clang 21, Glibc 2.31, libc++ static linking | Testing..."
        run: |
          bazel build --color=yes --config=build_cuda_with_clang \
            --config=cuda12 \
            --config=cuda_libraries_from_stubs \
            --repo_env=LLVM_VERSION=21 \
            --repo_env=SYSROOT_DIST=linux_glibc_2_31 \
            --@rules_ml_toolchain//common:stdlib=libc++ \
            --@rules_ml_toolchain//common:static_libcxx=true \
            //cc/tests/gpu:all

      - name: "Clang 22, Glibc 2.35, libc++ static linking | Testing..."
        run: |
          bazel build --color=yes --config=build_cuda_with_clang \
            --config=cuda12 \
            --config=cuda_libraries_from_stubs \
            --repo_env=LLVM_VERSION=22 \
            --repo_env=SYSROOT_DIST=linux_glibc_2_35 \
            --@rules_ml_toolchain//common:stdlib=libc++ \
            --@rules_ml_toolchain//common:static_libcxx=true \
            //cc/tests/gpu:all

      - name: "Clang 22, Glibc 2.39, libc++ static linking | Testing..."
        run: |
          bazel build --color=yes --config=build_cuda_with_clang \
            --config=cuda12 \
            --config=cuda_libraries_from_stubs \
            --repo_env=LLVM_VERSION=22 \
            --repo_env=SYSROOT_DIST=linux_glibc_2_39 \
            --@rules_ml_toolchain//common:stdlib=libc++ \
            --@rules_ml_toolchain//common:static_libcxx=true \
            //cc/tests/gpu:all

      - name: "NVCC building..."
        run: |
          bazel build --color=yes --config=build_cuda_with_nvcc \
            --config=cuda12 \
            --config=cuda_libraries_from_stubs \
            //cc/tests/gpu:all

      - name: "Bzlmod. Clang 18, Glibc 2.27 | Testing..."
        run: |
          bazel build --color=yes --config=build_cuda_with_clang \
            --config=cuda12 \
            --config=cuda_libraries_from_stubs \
            --repo_env HERMETIC_CUDA_COMPUTE_CAPABILITIES="sm_50,sm_60,sm_70,sm_80,sm_90" \
            --config=bzlmod \
            //cc/tests/gpu:all

      - name: "Bzlmod. Clang 18, Glibc 2.27, libc++ static linking | Testing..."
        run: |
          bazel build --color=yes --config=build_cuda_with_clang \
            --config=cuda12 \
            --config=cuda_libraries_from_stubs \
            --config=bzlmod \
            --repo_env HERMETIC_CUDA_COMPUTE_CAPABILITIES="sm_50,sm_60,sm_70,sm_80,sm_90" \
            --@rules_ml_toolchain//common:stdlib=libc++ \
            --@rules_ml_toolchain//common:static_libcxx=true \
            //cc/tests/gpu:all

      - name: "Bzlmod. Clang 21, Glibc 2.31, libc++ static linking | Testing..."
        run: |
          bazel build --color=yes --config=build_cuda_with_clang \
            --config=cuda12 \
            --config=cuda_libraries_from_stubs \
            --config=bzlmod \
            --repo_env=LLVM_VERSION=21 \
            --repo_env=SYSROOT_DIST=linux_glibc_2_31 \
            --@rules_ml_toolchain//common:stdlib=libc++ \
            --@rules_ml_toolchain//common:static_libcxx=true \
            //cc/tests/gpu:all

      - name: "Bzlmod. Clang 22, Glibc 2.35, libc++ static linking | Testing..."
        run: |
          bazel build --color=yes --config=build_cuda_with_clang \
            --config=cuda12 \
            --config=cuda_libraries_from_stubs \
            --config=bzlmod \
            --repo_env=LLVM_VERSION=22 \
            --repo_env=SYSROOT_DIST=linux_glibc_2_35 \
            --@rules_ml_toolchain//common:stdlib=libc++ \
            --@rules_ml_toolchain//common:static_libcxx=true \
            //cc/tests/gpu:all

      - name: "Bzlmod. Clang 22, Glibc 2.39, libc++ static linking | Testing..."
        run: |
          bazel build --color=yes --config=build_cuda_with_clang \
            --config=cuda12 \
            --config=cuda_libraries_from_stubs \
            --config=bzlmod \
            --repo_env=LLVM_VERSION=22 \
            --repo_env=SYSROOT_DIST=linux_glibc_2_39 \
            --@rules_ml_toolchain//common:stdlib=libc++ \
            --@rules_ml_toolchain//common:static_libcxx=true \
            //cc/tests/gpu:all

      - name: "Bzlmod. NVCC | Testing..."
        run: |
          bazel build --color=yes --config=build_cuda_with_nvcc \
            --config=cuda12 \
            --config=cuda_libraries_from_stubs \
            --config=bzlmod \
            //cc/tests/gpu:all

