name: CI - CPU Sanitizers Linux x86_64 -> Linux x86_64 tests. Min LLVM/sysroot tests

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read
  pull-requests: read
  issues: read

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  # Don't cancel in-progress jobs for main branch
  cancel-in-progress: ${{ github.ref != 'main' }}

jobs:
  run-tests:
    name: "CPU Sanitizers Linux x86_64 -> Linux x86_64 tests. Min LLVM/sysroot. Runner ${{ matrix.job_info.runner }}"
    defaults:
      run:
        # Explicitly set the shell to bash
        shell: bash
    strategy:
      matrix:
        job_info: [
          {
            runner: "linux-x86-n2-16",
            container: "us-docker.pkg.dev/ml-oss-artifacts-published/ml-public-container/ml-build:latest",
          },
        ]
    # Use self-hosted runners. For a Linux runner, a corresponding container image used for the
    # workflow is required.
    # See go/ml-github-actions/getting_started/using_runners.md#supported-runner-scale-set.
    runs-on: ${{ matrix.job_info.runner }}
    container:
      image: ${{ matrix.job_info.container }}
    steps:
      - name: "Checkout repository"
        uses: actions/checkout@v5

      - name: "ASan Clang 18, Glibc 2.27 | Testing..."
        run: bazel test --color=yes --config=asan //cc/sanitizers/tests:asan_test

      - name: "Bzlmod. ASan Clang 18, Glibc 2.27 | Testing..."
        run: bazel test --color=yes --config=asan --config=bzlmod //cc/sanitizers/tests:asan_test

      - name: "TSan Clang 18, Glibc 2.27 | Testing..."
        run: bazel test --color=yes --config=tsan --config=tsan_test //cc/sanitizers/tests:tsan_test

      - name: "Bzlmod. TSan Clang 18, Glibc 2.27 | Testing..."
        run: bazel test --color=yes --config=tsan --config=tsan_test --config=bzlmod //cc/sanitizers/tests:tsan_test
